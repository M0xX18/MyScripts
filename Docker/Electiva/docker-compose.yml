version: '3.8'

services:
  coordinator:
    image: citusdata/citus:11.3
    container_name: coordinator
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=factory
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5432:5432"
    depends_on:
      - worker1
      - worker2
    networks:
      - citusnet
    volumes:
      - coordinator_data:/var/lib/postgresql/data

  worker1:
    image: citusdata/citus:11.3
    container_name: worker1
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5433:5432"
    networks:
      - citusnet
    volumes:
      - worker1_data:/var/lib/postgresql/data

  worker2:
    image: citusdata/citus:11.3
    container_name: worker2
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5434:5432"
    networks:
      - citusnet
    volumes:
      - worker2_data:/var/lib/postgresql/data
  
  etl:
    image: python:3.10
    container_name: python_etl
    depends_on:
      - coordinator
    networks:
      - citusnet
    volumes:
      - ./etl:/app
    working_dir: /app
    command: ["sh", "-c", "pip install psycopg2-binary && python etl.py"]

networks:
  citusnet:
    driver: bridge

volumes:
  coordinator_data:
  worker1_data:
  worker2_data:
